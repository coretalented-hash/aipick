<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIPICK 진단·개선 리포트 (코탤 내부 템플릿)</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="assets/cotal-logo-blue.png" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
:root{
  --blue:#3955c7;--blue-700:#28398a;--blue-950:#0f1430;--blue-tint:#eef1fc;
  --silver:#f7f7f7;--ink:#14181f;--ink-2:#2b3138;--muted:#5b6573;--muted-2:#646d7c;
  --line:#e7e9ee;--line-2:#dfe3ea;--green:#1aa260;--red:#dc4a4a;--amber:#e0962a;
  --radius:14px;--radius-lg:20px;--shadow-sm:0 2px 8px rgba(20,24,31,.06);--shadow:0 10px 30px rgba(20,24,31,.08);
  --font:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI','Malgun Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:var(--ink);background:var(--silver);line-height:1.6;letter-spacing:-.01em;word-break:keep-all;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:14.5px;padding:12px 22px;border-radius:999px;border:none;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--blue);color:#fff}
.btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line-2)}
.btn-primary:hover{background:var(--blue-700)}

/* ---------- Editor (내부용, 인쇄 제외) ---------- */
.editor{max-width:960px;margin:24px auto;background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);padding:26px 28px;box-shadow:var(--shadow-sm)}
.editor h2{font-size:18px;margin-bottom:4px}
.editor h2 span{font-size:12.5px;font-weight:600;color:var(--muted-2)}
.editor .desc{font-size:13px;color:var(--muted);margin-bottom:20px}
.editor label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
.editor input,.editor textarea{width:100%;border:1px solid var(--line-2);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--ink);margin-bottom:16px;background:#fff}
.editor textarea.json{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;height:150px;line-height:1.5;white-space:pre}
.editor textarea#f_note{height:64px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 18px}
.checks2{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-bottom:16px}
.cb{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:500;color:var(--ink-2)}
.cb input{width:auto;margin:0}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.err{background:#fdeef0;color:var(--red);border:1px solid #f7d4d9;border-radius:10px;padding:12px 14px;font-size:13.5px;font-weight:600;margin-top:12px}

/* ---------- Report (인쇄 대상) ---------- */
.report{max-width:820px;margin:0 auto 40px;background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden}
.rep-head{background:linear-gradient(135deg,var(--blue-950),var(--blue-700));color:#fff;padding:34px 40px}
.rep-head .top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:20px}
.rep-head .top img{height:22px}
.rep-head .top .doc{font-size:12px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.7)}
.rep-head h1{font-size:26px;font-weight:800;line-height:1.3;margin-bottom:16px}
.rep-meta{display:flex;flex-wrap:wrap;gap:6px 26px;font-size:13px;color:rgba(255,255,255,.8)}
.rep-meta b{color:#fff;font-weight:700}
.rep-body{padding:34px 40px}
.rep-sec{margin-bottom:34px}
.rep-sec:last-child{margin-bottom:0}
.rep-sec h2{font-size:13px;font-weight:800;letter-spacing:.08em;color:var(--blue);text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--blue-tint)}

/* summary */
.sum{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;background:var(--silver);border-radius:var(--radius);padding:26px}
.sum .blk{text-align:center}
.sum .blk .lbl{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--muted-2);margin-bottom:6px}
.sum .blk .sc{font-size:48px;font-weight:800;line-height:1}
.sum .arrow{font-size:26px;color:var(--blue);font-weight:800}
.sum .delta{background:var(--green);color:#fff;font-weight:800;font-size:15px;padding:8px 16px;border-radius:999px}

/* compare table */
.cmp{width:100%;border-collapse:collapse;font-size:13.5px}
.cmp th,.cmp td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line)}
.cmp th{font-size:11.5px;font-weight:800;letter-spacing:.04em;color:var(--muted-2);text-transform:uppercase}
.cmp td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
.cmp .barwrap{display:flex;align-items:center;gap:8px}
.cmp .bar{flex:1;height:7px;border-radius:999px;background:var(--silver);overflow:hidden;min-width:60px}
.cmp .bar > i{display:block;height:100%;border-radius:999px}
.cmp tr.total td{border-top:2px solid var(--line-2);border-bottom:none;font-weight:800;font-size:15px;color:var(--ink)}
.up{color:var(--green);font-weight:800}

/* crawler chips */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:12px;font-weight:600;padding:4px 11px;border-radius:999px;border:1px solid var(--line-2)}
.chip.ok{color:var(--green);background:#eafaf1;border-color:#cdeed9}
.chip.no{color:var(--red);background:#fdeef0;border-color:#f7d4d9}
.crawl-row{display:grid;grid-template-columns:64px 1fr;gap:12px;align-items:center;margin-bottom:10px}
.crawl-row .when{font-size:12px;font-weight:800;color:var(--muted-2)}

/* work list */
.work{list-style:none;display:flex;flex-direction:column;gap:9px}
.work li{display:flex;gap:10px;font-size:14px;color:var(--ink-2);line-height:1.5}
.work li svg{width:18px;height:18px;color:var(--green);flex:none;margin-top:1px}
.note-txt{font-size:13.5px;color:var(--muted);line-height:1.7;margin-top:12px;white-space:pre-wrap}

/* next steps */
.next{list-style:none;display:flex;flex-direction:column;gap:9px}
.next li{display:flex;gap:9px;font-size:14px;color:var(--ink-2);line-height:1.6}
.next li::before{content:"›";color:var(--blue);font-weight:800;flex:none}

.rep-foot{border-top:1px solid var(--line);padding:20px 40px;font-size:11.5px;color:var(--muted-2);line-height:1.7}
.rep-foot b{color:var(--muted)}

@media (max-width:640px){
  .grid2,.checks2{grid-template-columns:1fr}
  .rep-head,.rep-body,.rep-foot{padding-left:22px;padding-right:22px}
}

/* ---------- 인쇄 / PDF ---------- */
@media print{
  body{background:#fff}
  .no-print{display:none !important}
  .report{box-shadow:none;margin:0;max-width:none;border-radius:0}
  .rep-sec{break-inside:avoid}
  @page{margin:14mm}
}
</style>
</head>
<body>

<!-- ============ 편집 패널 (코탤 내부용 · 인쇄 제외) ============ -->
<div class="editor no-print">
  <h2>리포트 데이터 입력 <span>· 코탤 내부용 (인쇄/PDF에는 제외됩니다)</span></h2>
  <p class="desc">진단 도구 결과(<code>diagnose.py --json</code> 또는 <code>/api/diagnose</code> 출력)를 Before/After에 붙여넣고 <b>리포트 생성</b>을 누르세요. 아래는 예시 데이터입니다.</p>

  <div class="grid2">
    <div><label>고객 / 브랜드명</label><input id="f_client" value="OO의원" /></div>
    <div><label>사이트 URL</label><input id="f_url" value="https://example-clinic.co.kr" /></div>
    <div><label>진단일 (Before)</label><input id="f_dbefore" value="2026-06-01" /></div>
    <div><label>재진단일 (After)</label><input id="f_dafter" value="2026-06-22" /></div>
  </div>

  <label>수행 작업 (체크한 항목만 리포트에 표시)</label>
  <div class="checks2">
    <label class="cb"><input type="checkbox" id="w1" checked /> robots.txt — AI 크롤러 허용</label>
    <label class="cb"><input type="checkbox" id="w2" checked /> 구조화 데이터(JSON-LD) 추가</label>
    <label class="cb"><input type="checkbox" id="w3" checked /> 메타·Open Graph 정비</label>
    <label class="cb"><input type="checkbox" id="w4" checked /> sitemap.xml 생성·등록</label>
    <label class="cb"><input type="checkbox" id="w5" checked /> 핵심 글 5편 인용형 재구성</label>
    <label class="cb"><input type="checkbox" id="w6" checked /> 업종 맞춤 키워드 설계</label>
  </div>

  <label>추가 메모 (선택)</label>
  <textarea id="f_note">의료광고 심의 대상 표현은 제외하고 정보형 구조로 재구성했습니다.</textarea>

  <div class="grid2">
    <div><label>Before 진단 JSON</label><textarea id="f_before" class="json">{
  "url": "https://example-clinic.co.kr",
  "result": {
    "aipick_score": 32,
    "grade": "주의 — 전문직 사이트 평균 수준(약 32점) 부근",
    "categories": {
      "ai_crawler_access": {"score": 8.8, "max": 35, "allowed": 4, "total": 14},
      "structured_data":   {"score": 0,   "max": 25, "types": []},
      "crawlability":       {"score": 12,  "max": 20},
      "citability":         {"score": 8,   "max": 20}
    },
    "recommendations": [
      "AI 크롤러 다수 차단됨 — robots.txt 허용 필요",
      "JSON-LD 구조화 데이터 없음"
    ]
  },
  "crawlers": {"bots": {
    "GPTBot": {"allowed": false}, "OAI-SearchBot": {"allowed": false},
    "ClaudeBot": {"allowed": false}, "Google-Extended": {"allowed": false},
    "PerplexityBot": {"allowed": false}
  }}
}</textarea></div>
    <div><label>After 진단 JSON</label><textarea id="f_after" class="json">{
  "url": "https://example-clinic.co.kr",
  "result": {
    "aipick_score": 78,
    "grade": "양호 — 일부 보완 필요",
    "categories": {
      "ai_crawler_access": {"score": 35, "max": 35, "allowed": 14, "total": 14},
      "structured_data":   {"score": 25, "max": 25, "types": ["MedicalBusiness","FAQPage","Article"]},
      "crawlability":       {"score": 18, "max": 20},
      "citability":         {"score": 16, "max": 20}
    },
    "recommendations": [
      "지속 발행으로 인용 빈도 확대 권장",
      "비교·표 형태 콘텐츠 추가 여지"
    ]
  },
  "crawlers": {"bots": {
    "GPTBot": {"allowed": true}, "OAI-SearchBot": {"allowed": true},
    "ClaudeBot": {"allowed": true}, "Google-Extended": {"allowed": true},
    "PerplexityBot": {"allowed": true}
  }}
}</textarea></div>
  </div>

  <div><label>담당자 / 연락처</label><input id="f_contact" value="코탤 · ceo@co-tal.com" /></div>

  <div class="toolbar">
    <button id="btnRender" class="btn btn-primary">리포트 생성</button>
    <button id="btnPrint" class="btn btn-ghost">PDF로 저장 / 인쇄</button>
  </div>
  <div id="err"></div>
</div>

<!-- ============ 렌더링된 리포트 (인쇄 대상) ============ -->
<div id="report" class="report"></div>

<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  var val = function(id){ var e=$(id); return e?e.value.trim():''; };
  var esc = function(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); };
  var color = function(s){ return s>=80?'#1aa260':s>=60?'#3955c7':s>=40?'#e0962a':'#dc4a4a'; };

  var CATS = [
    ['ai_crawler_access','AI 크롤러 접근성'],
    ['structured_data','구조화 데이터'],
    ['crawlability','크롤링 기본기'],
    ['citability','콘텐츠 인용 가능성']
  ];
  var KEYBOTS = ['GPTBot','OAI-SearchBot','ClaudeBot','Google-Extended','PerplexityBot'];
  var WORK = [['w1','robots.txt — AI 크롤러 허용'],['w2','구조화 데이터(JSON-LD) 추가'],['w3','메타·Open Graph 정비'],['w4','sitemap.xml 생성·등록'],['w5','핵심 글 5편 인용형 재구성'],['w6','업종 맞춤 키워드 설계']];

  function showErr(msg){ $('err').innerHTML = '<div class="err">'+esc(msg)+'</div>'; }
  function clearErr(){ $('err').innerHTML=''; }

  function cmpRows(b, a){
    var rows='';
    CATS.forEach(function(c){
      var bc=(b.result.categories||{})[c[0]]||{score:0,max:0};
      var ac=(a.result.categories||{})[c[0]]||{score:0,max:0};
      var bp=bc.max?Math.round(bc.score/bc.max*100):0;
      var ap=ac.max?Math.min(100,Math.round(ac.score/ac.max*100)):0;
      var d=Math.round((ac.score||0)-(bc.score||0));
      rows += '<tr><td>'+c[1]+'</td>'
        + '<td class="num">'+ (Math.round(bc.score)) +'/'+bc.max+'</td>'
        + '<td><div class="barwrap"><span class="bar"><i style="width:'+ap+'%;background:'+color(ap)+'"></i></span>'
          + '<b style="white-space:nowrap">'+Math.round(ac.score)+'/'+ac.max+'</b></div></td>'
        + '<td class="num">'+(d>0?'<span class="up">+'+d+'</span>':d)+'</td></tr>';
    });
    rows += '<tr class="total"><td>AIPICK Score</td><td class="num">'+b.result.aipick_score+'</td>'
      + '<td><b>'+a.result.aipick_score+' / 100</b></td>'
      + '<td class="num"><span class="up">+'+(a.result.aipick_score-b.result.aipick_score)+'</span></td></tr>';
    return rows;
  }

  function chips(data){
    var bots=(data.crawlers||{}).bots||{};
    return KEYBOTS.map(function(n){
      if(!bots[n]) return '';
      var ok=bots[n].allowed;
      return '<span class="chip '+(ok?'ok':'no')+'">'+(ok?'✓ ':'✗ ')+n+'</span>';
    }).join('');
  }
  function botCount(data){
    var bots=(data.crawlers||{}).bots||{}; var ks=Object.keys(bots);
    return ks.filter(function(n){return bots[n].allowed;}).length+'/'+ks.length;
  }

  function render(){
    clearErr();
    var before, after;
    try { before = JSON.parse(val('f_before')); } catch(e){ return showErr('Before JSON 파싱 오류: '+e.message); }
    try { after  = JSON.parse(val('f_after'));  } catch(e){ return showErr('After JSON 파싱 오류: '+e.message); }
    if(!before.result || !after.result){ return showErr('JSON에 result 항목이 없습니다. 진단 도구 출력 전체를 붙여넣어 주세요.'); }

    var client=esc(val('f_client')), url=esc(val('f_url')), db=esc(val('f_dbefore')), da=esc(val('f_dafter')), contact=esc(val('f_contact')), note=val('f_note');
    var bs=before.result.aipick_score, as=after.result.aipick_score, delta=as-bs;

    var workItems = WORK.filter(function(w){ var c=$(w[0]); return c && c.checked; })
      .map(function(w){ return '<li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'+w[1]+'</li>'; }).join('');

    var nextItems = (after.result.recommendations||[]).map(function(r){ return '<li>'+esc(r)+'</li>'; }).join('') || '<li>현 수준 유지를 위해 정기 재진단을 권장합니다.</li>';

    var html = ''
      + '<div class="rep-head">'
        + '<div class="top"><img src="assets/cotal-logo-white.png" alt="COTAL"/><span class="doc">AIPICK REPORT</span></div>'
        + '<h1>AI 검색 최적화 진단·개선 리포트</h1>'
        + '<div class="rep-meta"><span>고객: <b>'+client+'</b></span><span>사이트: <b>'+url+'</b></span><span>진단: <b>'+db+'</b> → 재진단: <b>'+da+'</b></span></div>'
      + '</div>'
      + '<div class="rep-body">'

        + '<div class="rep-sec"><h2>한눈에 보기</h2>'
          + '<div class="sum">'
            + '<div class="blk"><div class="lbl">BEFORE</div><div class="sc" style="color:'+color(bs)+'">'+bs+'</div></div>'
            + '<div class="arrow">→</div>'
            + '<div class="blk"><div class="lbl">AFTER</div><div class="sc" style="color:'+color(as)+'">'+as+'</div></div>'
            + '<div class="delta">'+(delta>=0?'+':'')+delta+'점</div>'
          + '</div>'
        + '</div>'

        + '<div class="rep-sec"><h2>항목별 변화</h2>'
          + '<table class="cmp"><thead><tr><th>항목</th><th class="num">전</th><th>후</th><th class="num">변화</th></tr></thead>'
          + '<tbody>'+cmpRows(before, after)+'</tbody></table>'
        + '</div>'

        + '<div class="rep-sec"><h2>AI 크롤러 접근 (전 '+botCount(before)+' → 후 '+botCount(after)+' 허용)</h2>'
          + '<div class="crawl-row"><span class="when">BEFORE</span><div class="chips">'+chips(before)+'</div></div>'
          + '<div class="crawl-row"><span class="when">AFTER</span><div class="chips">'+chips(after)+'</div></div>'
        + '</div>'

        + '<div class="rep-sec"><h2>수행 작업 내역</h2>'
          + '<ul class="work">'+workItems+'</ul>'
          + (note ? '<div class="note-txt">메모 — '+esc(note)+'</div>' : '')
        + '</div>'

        + '<div class="rep-sec"><h2>다음 단계 권고</h2>'
          + '<ul class="next">'+nextItems+'</ul>'
        + '</div>'

      + '</div>'
      + '<div class="rep-foot">'
        + '담당: '+contact+'<br>'
        + '<b>※</b> 본 리포트의 점수는 코탤 AIPICK 진단 엔진 기준이며, AI의 실제 인용·추천은 알고리즘 특성상 보장되지 않습니다. 결과는 업종·경쟁 상황에 따라 달라질 수 있습니다. 의료·법률 등 광고 규제 업종은 관련 법령(의료법·변호사법 등) 준수가 필요합니다.<br>'
        + '© 2026 Cotal Inc. · AIPICK'
      + '</div>';

    $('report').innerHTML = html;
  }

  $('btnRender').addEventListener('click', render);
  $('btnPrint').addEventListener('click', function(){ render(); window.print(); });
  render(); // 로드 시 예시로 즉시 렌더링
})();
</script>
</body>
</html>
